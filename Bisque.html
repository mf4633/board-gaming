<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BISQUE — Battle for the Bay</title>
<style>
@keyframes diceRoll {
  0% { transform: rotateX(0deg) rotateY(0deg) scale(0.5); opacity: 0; }
  50% { transform: rotateX(180deg) rotateY(180deg) scale(1.2); opacity: 1; }
  100% { transform: rotateX(360deg) rotateY(360deg) scale(1); opacity: 1; }
}
@keyframes glow {
  0% { box-shadow: 0 0 5px rgba(255,200,100,0.5); }
  50% { box-shadow: 0 0 18px rgba(255,200,100,0.9); }
  100% { box-shadow: 0 0 5px rgba(255,200,100,0.5); }
}
@keyframes conquerFlash {
  0% { filter: brightness(1); }
  25% { filter: brightness(1.8); }
  50% { filter: brightness(1); }
  75% { filter: brightness(1.5); }
  100% { filter: brightness(1); }
}
@keyframes trapBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0E1820;
  color: #D8D0C0;
  font-family: Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}
#header {
  text-align: center;
  padding: 12px 0 6px 0;
}
#header h1 {
  font-size: 2.2em;
  letter-spacing: 6px;
  color: #C05030;
  text-shadow: 0 2px 8px rgba(192,80,48,0.4);
  margin: 0;
}
#header .subtitle {
  font-size: 0.85em;
  color: #8098A8;
  letter-spacing: 2px;
  margin-top: -2px;
}
#modeToggle {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 8px auto 4px auto;
}
#modeToggle button {
  font-family: Georgia, serif;
  font-size: 0.85em;
  padding: 5px 18px;
  border: 2px solid #C05030;
  background: transparent;
  color: #D8D0C0;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#modeToggle button:first-child { border-radius: 6px 0 0 6px; }
#modeToggle button:last-child { border-radius: 0 6px 6px 0; }
#modeToggle button.active {
  background: #C05030;
  color: #fff;
}
#playerCountToggle {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 4px auto 4px auto;
}
#playerCountToggle button {
  font-family: Georgia, serif;
  font-size: 0.8em;
  padding: 4px 14px;
  border: 2px solid #806040;
  background: transparent;
  color: #D8D0C0;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#playerCountToggle button:first-child { border-radius: 6px 0 0 6px; }
#playerCountToggle button:last-child { border-radius: 0 6px 6px 0; }
#playerCountToggle button.active {
  background: #806040;
  color: #fff;
}
#turnInfo {
  text-align: center;
  padding: 6px 0;
  font-size: 0.95em;
  min-height: 28px;
}
#turnInfo .phase-label {
  color: #C05030;
  font-weight: bold;
}
#mapWrap {
  position: relative;
  width: 750px;
  height: 480px;
  margin: 6px auto;
  border-radius: 12px;
  border: 2px solid #2A4050;
  overflow: hidden;
  background: #0E1820;
}
.water-label {
  position: absolute;
  color: rgba(80, 140, 170, 0.25);
  font-family: Georgia, serif;
  font-style: italic;
  letter-spacing: 2px;
  pointer-events: none;
  z-index: 0;
  white-space: nowrap;
}
#mapSvg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}
#mapSvg line {
  stroke: #2A4050;
  stroke-width: 1.2;
  stroke-dasharray: 4,3;
  opacity: 0.6;
}
.territory {
  position: absolute;
  border-radius: 8px;
  padding: 4px 8px;
  text-align: center;
  cursor: pointer;
  border: 2px solid #2A4050;
  font-size: 0.58em;
  min-width: 58px;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
  z-index: 2;
  line-height: 1.2;
}
.territory:hover {
  border-color: #D8D0C0 !important;
  z-index: 5;
}
.territory.selected {
  animation: glow 1s infinite;
  border-color: #FFC864 !important;
  z-index: 10;
}
.territory.conquered {
  animation: conquerFlash 0.5s ease;
}
.territory .t-name {
  font-size: 0.9em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0.85;
}
.territory .t-traps {
  font-size: 1.7em;
  font-weight: bold;
  line-height: 1.1;
}
.territory .t-traps.bounce {
  animation: trapBounce 0.3s ease;
}
.territory.water {
  border-style: dashed;
}
.p1 { background: rgba(192,80,48,0.35); border-color: rgba(192,80,48,0.7); color: #F0D0C0; }
.p2 { background: rgba(48,128,176,0.35); border-color: rgba(48,128,176,0.7); color: #C0D8E8; }
.p3 { background: rgba(64,160,80,0.35); border-color: rgba(64,160,80,0.7); color: #C0E8C8; }
.p4 { background: rgba(208,160,48,0.35); border-color: rgba(208,160,48,0.7); color: #E8DCC0; }
.pN { background: rgba(136,136,136,0.30); border-color: rgba(136,136,136,0.6); color: #C0C0C0; }
#diceArea {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  min-height: 60px;
  padding: 4px 0;
}
.dice-group {
  display: flex;
  gap: 6px;
  align-items: center;
}
.dice-group .dice-label {
  font-size: 0.75em;
  color: #8098A8;
  margin-right: 4px;
}
.die {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3em;
  font-weight: bold;
  color: #fff;
  animation: diceRoll 0.5s ease;
}
.die.atk { background: #C05030; }
.die.def { background: #3080B0; }
.die.win { box-shadow: 0 0 8px rgba(255,255,100,0.8); }
.die.lose { opacity: 0.45; }
#actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 4px 0;
}
#actions button {
  font-family: Georgia, serif;
  font-size: 0.85em;
  padding: 7px 20px;
  border: 2px solid #C05030;
  border-radius: 6px;
  background: transparent;
  color: #D8D0C0;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#actions button:hover:not(:disabled) {
  background: #C05030;
  color: #fff;
}
#actions button:disabled {
  opacity: 0.3;
  cursor: default;
}
#messageArea {
  text-align: center;
  font-size: 0.9em;
  color: #B0A890;
  min-height: 22px;
  padding: 4px 16px;
  max-width: 750px;
}
#legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  padding: 6px 10px 14px 10px;
  max-width: 750px;
}
.legend-group {
  background: #1A2028;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 0.72em;
  border-left: 3px solid;
}
.legend-group .lg-name { font-weight: bold; }
.legend-group .lg-bonus { color: #C05030; }
#overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(14,24,32,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#overlay.show { display: flex; }
#overlayBox {
  background: #1A2028;
  border: 2px solid #C05030;
  border-radius: 12px;
  padding: 30px 40px;
  text-align: center;
  max-width: 400px;
}
#overlayBox h2 {
  color: #C05030;
  font-size: 1.6em;
  margin-bottom: 10px;
}
#overlayBox p {
  color: #D8D0C0;
  margin-bottom: 16px;
  font-size: 1em;
}
#overlayBox button {
  font-family: Georgia, serif;
  font-size: 1em;
  padding: 8px 28px;
  border: 2px solid #C05030;
  border-radius: 6px;
  background: #C05030;
  color: #fff;
  cursor: pointer;
}
#deployInfo {
  text-align: center;
  font-size: 0.85em;
  color: #C8A060;
  min-height: 20px;
}
#scoreBar {
  display: flex;
  justify-content: center;
  gap: 24px;
  font-size: 0.82em;
  padding: 2px 0;
  flex-wrap: wrap;
}
.score-p1 { color: #E08060; }
.score-p2 { color: #60A0D0; }
.score-p3 { color: #60C070; }
.score-p4 { color: #D0B050; }
.score-pN { color: #999; }
/* Mobile game nav */
#mobileNav { display: none; }
@media (max-width: 768px) {
  #mobileNav { display: block; position: sticky; top: 0; z-index: 9999; background: #1A2030; border-bottom: 1px solid #2A4050; font-family: Georgia, serif; }
  #mobileNav .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; }
  #mobileNav .nav-title { color: #D8D0C0; font-size: 0.9em; letter-spacing: 1px; }
  #mobileNav .nav-toggle { background: none; border: 1px solid #3A5060; color: #D8D0C0; font-size: 1.2em; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
  #mobileNav .nav-menu { display: none; background: #141C28; border-top: 1px solid #2A4050; }
  #mobileNav .nav-menu.open { display: block; }
  #mobileNav .nav-menu a { display: block; padding: 10px 18px; color: #8098A8; text-decoration: none; font-size: 0.85em; border-bottom: 1px solid #1E2838; }
  #mobileNav .nav-menu a:hover { background: #1E2838; color: #D8D0C0; }
  #mobileNav .nav-menu a.current { color: #D8D0C0; font-weight: bold; }
}
</style>

/* ===== STATE ===== */
var state = {};
var mode = 1; /* 1 = vs AI, 2 = all human (hotseat) */
var playerCount = 2;
var aiTimer = null;
var selectedTerritory = null;
var attackSource = null;
var fortifySource = null;

function initState() {
  state = {
    territories: {},
    currentPlayer: 1,
    phase: 'deploy',
    trapsToPlace: 0,
    turnNumber: 1,
    gameOver: false,
    conqueredThisTurn: false,
    activePlayers: [],    /* list of active player numbers (1-based, 0=neutral) */
    eliminatedPlayers: [], /* players who lost all territories */
    hasNeutral: false
  };
  selectedTerritory = null;
  attackSource = null;
  fortifySource = null;
  if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
}

/* ===== SETUP ===== */
function resetGame() {
  initState();

  /* Determine active players and neutral */
  var totalTerritories = TERRITORIES.length; /* 27 */
  var hasNeutral = false;
  var neutralCount = 0;
  var perPlayer = 0;

  if (playerCount === 2) {
    perPlayer = 11;
    neutralCount = totalTerritories - (perPlayer * 2);
    hasNeutral = true;
  } else if (playerCount === 3) {
    perPlayer = 8;
    neutralCount = totalTerritories - (perPlayer * 3);
    hasNeutral = true;
  } else {
    perPlayer = Math.floor(totalTerritories / playerCount);
    neutralCount = totalTerritories - (perPlayer * playerCount);
    hasNeutral = neutralCount > 0;
  }

  state.hasNeutral = hasNeutral;

  /* Build active player list */
  state.activePlayers = [];
  for (var p = 1; p <= playerCount; p++) {
    state.activePlayers.push(p);
  }

  /* Shuffle & assign territories */
  var ids = TERRITORIES.map(function(t) { return t.id; });
  shuffle(ids);

  var idx = 0;
  /* Assign to each player */
  for (var pi = 1; pi <= playerCount; pi++) {
    var count = perPlayer;
    /* For 4 players, distribute remainder: first (totalTerritories % playerCount) players get an extra */
    if (playerCount === 4 && pi <= (totalTerritories % playerCount)) {
      count = perPlayer + 1;
    }
    for (var c = 0; c < count; c++) {
      state.territories[ids[idx]] = {
        owner: pi,
        traps: 1
      };
      idx++;
    }
  }

  /* Assign neutral territories */
  for (var ni = 0; ni < neutralCount; ni++) {
    state.territories[ids[idx]] = {
      owner: 0, /* 0 = neutral */
      traps: 2
    };
    idx++;
  }

  /* Assign any leftover (shouldn't happen but safety) */
  while (idx < ids.length) {
    state.territories[ids[idx]] = {
      owner: 0,
      traps: 2
    };
    idx++;
  }

  /* Distribute bonus starting traps to human/AI players (not neutral) */
  var startTrapsPerPlayer = 20;
  for (var sp = 1; sp <= playerCount; sp++) {
    var ownedByP = ids.filter(function(tid) { return state.territories[tid].owner === sp; });
    var alreadyPlaced = ownedByP.length; /* 1 per territory */
    var remaining = startTrapsPerPlayer - alreadyPlaced;
    if (remaining < 0) remaining = 0;
    for (var rr = 0; rr < remaining; rr++) {
      var pick = ownedByP[Math.floor(Math.random() * ownedByP.length)];
      state.territories[pick].traps++;
    }
  }

  /* Calculate initial deploy */
  state.trapsToPlace = calcReinforcements(1);
  state.phase = 'deploy';
  state.currentPlayer = 1;

  createMap();
  render();
  setMessage(randomMsg('deploy'));
}

function calcReinforcements(player) {
  if (player === 0) return 0; /* Neutral never reinforces */
  var owned = [];
  for (var tid in state.territories) {
    if (state.territories[tid].owner === player) owned.push(tid);
  }
  var base = Math.max(3, Math.floor(owned.length / 3));

  /* Group bonuses */
  var bonus = 0;
  var groupKeys = Object.keys(GROUPS);
  for (var g = 0; g < groupKeys.length; g++) {
    var gk = groupKeys[g];
    var groupTerrs = TERRITORIES.filter(function(t) { return t.group === gk; });
    var allOwned = groupTerrs.every(function(t) { return state.territories[t.id] && state.territories[t.id].owner === player; });
    if (allOwned) bonus += GROUPS[gk].bonus;
  }

  return base + bonus;
}

/* ===== MAP CREATION ===== */
function createMap() {
  var wrap = document.getElementById('mapWrap');
  /* Clear old territory divs and labels */
  var oldTs = wrap.querySelectorAll('.territory, .water-label');
  for (var i = 0; i < oldTs.length; i++) wrap.removeChild(oldTs[i]);

  /* Add water body labels */
  var waterLabels = [
    { text: 'Flanders Bay', x: 5, y: 225, size: '0.62em', rotate: -5 },
    { text: 'Peconic Bay', x: 80, y: 172, size: '0.68em', rotate: -8 },
    { text: 'Little Peconic', x: 80, y: 258, size: '0.62em', rotate: -3 },
    { text: 'Noyack Bay', x: 265, y: 275, size: '0.62em', rotate: 0 },
    { text: 'Gardiners Bay', x: 540, y: 138, size: '0.7em', rotate: 3 },
    { text: 'L.I. Sound', x: 180, y: 12, size: '0.6em', rotate: 0 }
  ];
  for (var wl = 0; wl < waterLabels.length; wl++) {
    var lbl = waterLabels[wl];
    var labelDiv = document.createElement('div');
    labelDiv.className = 'water-label';
    labelDiv.textContent = lbl.text;
    labelDiv.style.left = lbl.x + 'px';
    labelDiv.style.top = lbl.y + 'px';
    labelDiv.style.fontSize = lbl.size;
    labelDiv.style.transform = 'rotate(' + lbl.rotate + 'deg)';
    wrap.appendChild(labelDiv);
  }

  for (var t = 0; t < TERRITORIES.length; t++) {
    var td = TERRITORIES[t];
    var div = document.createElement('div');
    div.className = 'territory' + (td.water ? ' water' : '');
    div.id = 'terr-' + td.id;
    div.style.left = td.x + 'px';
    div.style.top = td.y + 'px';
    div.innerHTML = '<div class="t-name">' + td.name + '</div><div class="t-traps" id="traps-' + td.id + '">1</div>';
    div.setAttribute('data-id', td.id);
    div.onclick = (function(id) { return function() { onTerritoryClick(id); }; })(td.id);
    wrap.appendChild(div);
  }

  drawConnections();
  buildLegend();
}

function drawConnections() {
  var svg = document.getElementById('mapSvg');
  svg.innerHTML = '';
  var drawn = {};
  var keys = Object.keys(ADJACENCY);
  for (var i = 0; i < keys.length; i++) {
    var from = keys[i];
    var neighbors = ADJACENCY[from];
    for (var j = 0; j < neighbors.length; j++) {
      var to = neighbors[j];
      var pairKey = [from, to].sort().join('-');
      if (drawn[pairKey]) continue;
      drawn[pairKey] = true;

      var ft = getTerritoryData(from);
      var tt = getTerritoryData(to);
      if (!ft || !tt) continue;
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ft.x + 30);
      line.setAttribute('y1', ft.y + 18);
      line.setAttribute('x2', tt.x + 30);
      line.setAttribute('y2', tt.y + 18);
      svg.appendChild(line);
    }
  }
}

function buildLegend() {
  var legend = document.getElementById('legend');
  legend.innerHTML = '';
  var keys = Object.keys(GROUPS);
  for (var i = 0; i < keys.length; i++) {
    var g = GROUPS[keys[i]];
    var div = document.createElement('div');
    div.className = 'legend-group';
    div.style.borderLeftColor = g.border;
    div.innerHTML = '<span class="lg-name">' + g.name + '</span> <span class="lg-bonus">+' + g.bonus + ' traps</span>';
    legend.appendChild(div);
  }

  /* Player legend entries */
  for (var p = 1; p <= playerCount; p++) {
    var pc = PLAYER_COLORS[p];
    var pdiv = document.createElement('div');
    pdiv.className = 'legend-group';
    pdiv.style.borderLeftColor = pc.main;
    pdiv.innerHTML = '<span class="lg-name" style="color:' + pc.textColor + '">' + pc.icon + ' ' + pc.name + '</span>';
    legend.appendChild(pdiv);
  }

  /* Neutral legend if applicable */
  if (state.hasNeutral) {
    var nc = PLAYER_COLORS[0];
    var ndiv = document.createElement('div');
    ndiv.className = 'legend-group';
    ndiv.style.borderLeftColor = nc.main;
    ndiv.innerHTML = '<span class="lg-name" style="color:' + nc.textColor + '">' + nc.name + '</span>';
    legend.appendChild(ndiv);
  }
}

/* ===== RENDERING ===== */
function render() {
  for (var t = 0; t < TERRITORIES.length; t++) {
    var td = TERRITORIES[t];
    var ts = state.territories[td.id];
    var div = document.getElementById('terr-' + td.id);
    if (!div || !ts) continue;

    /* Player class */
    div.classList.remove('p1', 'p2', 'p3', 'p4', 'pN', 'selected');
    if (ts.owner === 0) {
      div.classList.add('pN');
    } else {
      div.classList.add('p' + ts.owner);
    }

    /* Coloring based on owner */
    var pc = PLAYER_COLORS[ts.owner];
    if (pc) {
      div.style.background = td.water
        ? pc.rgba + '0.25)'
        : pc.rgba + '0.35)';
      div.style.borderColor = pc.rgba + '0.7)';
    }

    /* Selected highlight */
    if (selectedTerritory === td.id || attackSource === td.id || fortifySource === td.id) {
      div.classList.add('selected');
    }

    /* Trap count */
    var trapsEl = document.getElementById('traps-' + td.id);
    if (trapsEl) trapsEl.textContent = ts.traps;
  }

  updateTurnInfo();
  updateButtons();
  updateScores();
}

function getPlayerSpan(player) {
  var pc = PLAYER_COLORS[player];
  if (!pc) return '<span>???</span>';
  return '<span style="color:' + pc.textColor + '">' + pc.name + '</span>';
}

function updateTurnInfo() {
  var info = document.getElementById('turnInfo');
  var di = document.getElementById('deployInfo');
  if (state.gameOver) {
    info.innerHTML = '';
    di.innerHTML = '';
    return;
  }
  var pName = getPlayerSpan(state.currentPlayer);
  var phaseNames = { deploy: 'Deploy Traps', attack: 'Haul (Attack)', fortify: 'Fortify' };
  info.innerHTML = 'Turn ' + state.turnNumber + ' &mdash; ' + pName + ' &mdash; <span class="phase-label">' + phaseNames[state.phase] + '</span>';

  if (state.phase === 'deploy' && state.trapsToPlace > 0) {
    di.innerHTML = 'Traps to deploy: <strong>' + state.trapsToPlace + '</strong>';
  } else {
    di.innerHTML = '';
  }
}

function updateButtons() {
  var btnEnd = document.getElementById('btnEndAttacks');
  var btnFort = document.getElementById('btnFortify');
  var btnTurn = document.getElementById('btnEndTurn');
  var isHuman = isCurrentPlayerHuman();

  btnEnd.disabled = !(state.phase === 'attack' && isHuman);
  btnFort.disabled = !(state.phase === 'fortify' && isHuman);
  btnTurn.disabled = !(state.phase !== 'deploy' && isHuman);
}

function isCurrentPlayerHuman() {
  if (state.currentPlayer === 0) return false; /* neutral never plays */
  if (mode === 2) return true; /* all human hotseat */
  /* mode 1: only player 1 is human */
  return state.currentPlayer === 1;
}

function updateScores() {
  var counts = {};
  for (var p = 0; p <= 4; p++) counts[p] = 0;
  for (var tid in state.territories) {
    counts[state.territories[tid].owner]++;
  }

  for (var pp = 1; pp <= 4; pp++) {
    var el = document.getElementById('score' + pp);
    if (el) {
      if (pp <= playerCount) {
        var pc = PLAYER_COLORS[pp];
        el.innerHTML = pc.icon + ' ' + pc.name + ': ' + counts[pp] + ' territories';
        el.style.display = '';
      } else {
        el.innerHTML = '';
        el.style.display = 'none';
      }
    }
  }

  var elN = document.getElementById('scoreN');
  if (elN) {
    if (state.hasNeutral && counts[0] > 0) {
      elN.innerHTML = '&#x2693; Neutral: ' + counts[0] + ' territories';
      elN.style.display = '';
    } else {
      elN.innerHTML = '';
      elN.style.display = 'none';
    }
  }
}

/* ===== TERRITORY CLICK ===== */
function onTerritoryClick(id) {
  if (state.gameOver) return;
  /* Ignore clicks if current player is not human */
  if (!isCurrentPlayerHuman()) return;

  if (state.phase === 'deploy') {
    handleDeploy(id);
  } else if (state.phase === 'attack') {
    handleAttack(id);
  } else if (state.phase === 'fortify') {
    handleFortify(id);
  }
}

/* ===== DEPLOY PHASE ===== */
function handleDeploy(id) {
  var ts = state.territories[id];
  if (!ts || ts.owner !== state.currentPlayer) {
    setMessage("That's not your territory, Captain!");
    return;
  }
  if (state.trapsToPlace <= 0) return;

  ts.traps++;
  state.trapsToPlace--;

  /* Bounce animation */
  var trapsEl = document.getElementById('traps-' + id);
  if (trapsEl) {
    trapsEl.classList.remove('bounce');
    void trapsEl.offsetWidth;
    trapsEl.classList.add('bounce');
  }

  render();

  if (state.trapsToPlace <= 0) {
    state.phase = 'attack';
    attackSource = null;
    render();
    setMessage(randomMsg('attack'));
  }
}

/* ===== ATTACK PHASE ===== */
function handleAttack(id) {
  var ts = state.territories[id];
  if (!ts) return;

  if (!attackSource) {
    /* Selecting attack source */
    if (ts.owner !== state.currentPlayer) {
      setMessage("Select one of YOUR territories to haul from.");
      return;
    }
    if (ts.traps < 2) {
      setMessage("Need at least 2 traps to launch a raid!");
      return;
    }
    /* Check for adjacent enemies */
    var adj = ADJACENCY[id] || [];
    var hasEnemy = adj.some(function(a) { return state.territories[a] && state.territories[a].owner !== state.currentPlayer; });
    if (!hasEnemy) {
      setMessage("No enemy neighbors to haul against.");
      return;
    }
    attackSource = id;
    selectedTerritory = null;
    render();
    setMessage("Now click an enemy neighbor to attack.");
  } else {
    /* Clicking same territory deselects */
    if (id === attackSource) {
      attackSource = null;
      render();
      setMessage(randomMsg('attack'));
      return;
    }
    /* Must be adjacent enemy */
    var adjList = ADJACENCY[attackSource] || [];
    if (adjList.indexOf(id) === -1) {
      setMessage("That territory isn't adjacent. Pick a neighbor.");
      return;
    }
    if (ts.owner === state.currentPlayer) {
      /* Switch source */
      if (ts.traps >= 2) {
        attackSource = id;
        render();
        setMessage("Source switched. Click an enemy neighbor to attack.");
      } else {
        setMessage("Need at least 2 traps to haul from there.");
      }
      return;
    }

    /* COMBAT */
    resolveCombat(attackSource, id);
  }
}

function resolveCombat(atkId, defId) {
  var atk = state.territories[atkId];
  var def = state.territories[defId];
  var atkDice = Math.min(3, atk.traps - 1);
  var defDice = Math.min(2, def.traps);

  var atkRolls = rollDice(atkDice).sort(function(a, b) { return b - a; });
  var defRolls = rollDice(defDice).sort(function(a, b) { return b - a; });

  var comparisons = Math.min(atkRolls.length, defRolls.length);
  var atkLosses = 0, defLosses = 0;
  var atkResults = [], defResults = [];

  for (var i = 0; i < comparisons; i++) {
    if (atkRolls[i] > defRolls[i]) {
      defLosses++;
      atkResults.push('win');
      defResults.push('lose');
    } else {
      atkLosses++;
      atkResults.push('lose');
      defResults.push('win');
    }
  }
  /* Mark extra dice as neutral */
  for (var j = comparisons; j < atkRolls.length; j++) atkResults.push('');
  for (var k = comparisons; k < defRolls.length; k++) defResults.push('');

  showDice(atkRolls, atkResults, defRolls, defResults);

  atk.traps -= atkLosses;
  def.traps -= defLosses;

  /* Territory conquered */
  if (def.traps <= 0) {
    var previousOwner = def.owner;
    def.owner = state.currentPlayer;
    var moved = atkDice;
    if (moved > atk.traps - 1) moved = atk.traps - 1;
    if (moved < 1) moved = 1;
    def.traps = moved;
    atk.traps -= moved;
    state.conqueredThisTurn = true;

    /* Flash animation */
    var terrDiv = document.getElementById('terr-' + defId);
    if (terrDiv) {
      terrDiv.classList.add('conquered');
      setTimeout(function() { terrDiv.classList.remove('conquered'); }, 600);
    }

    setMessage(randomMsg('atkWin'));
    attackSource = null;

    /* Check if previous owner is eliminated */
    if (previousOwner !== 0) {
      checkPlayerEliminated(previousOwner);
    }

    /* Check victory */
    if (checkVictory()) return;
  } else {
    /* Attack continues, check if source can still attack */
    if (atk.traps < 2) {
      setMessage(randomMsg('atkLose') + " Not enough traps to continue from here.");
      attackSource = null;
    } else {
      if (atkLosses > 0) {
        setMessage(randomMsg('atkLose'));
      } else {
        setMessage(randomMsg('defLose'));
      }
    }
  }

  render();
}

function rollDice(n) {
  var rolls = [];
  for (var i = 0; i < n; i++) {
    rolls.push(Math.floor(Math.random() * 6) + 1);
  }
  return rolls;
}

function showDice(atkRolls, atkResults, defRolls, defResults) {
  var area = document.getElementById('diceArea');
  var html = '<div class="dice-group"><span class="dice-label">ATK</span>';
  for (var i = 0; i < atkRolls.length; i++) {
    html += '<div class="die atk ' + atkResults[i] + '">' + diceFace(atkRolls[i]) + '</div>';
  }
  html += '</div>';
  html += '<div style="color:#555;font-size:1.5em">vs</div>';
  html += '<div class="dice-group"><span class="dice-label">DEF</span>';
  for (var j = 0; j < defRolls.length; j++) {
    html += '<div class="die def ' + defResults[j] + '">' + diceFace(defRolls[j]) + '</div>';
  }
  html += '</div>';
  area.innerHTML = html;
}

function diceFace(n) { return n; }

/* ===== FORTIFY PHASE ===== */
function handleFortify(id) {
  var ts = state.territories[id];
  if (!ts) return;

  if (!fortifySource) {
    if (ts.owner !== state.currentPlayer) {
      setMessage("Select one of your territories to move traps FROM.");
      return;
    }
    if (ts.traps < 2) {
      setMessage("Need at least 2 traps to fortify from here.");
      return;
    }
    fortifySource = id;
    render();
    setMessage("Click an adjacent friendly territory to move traps TO.");
  } else {
    if (id === fortifySource) {
      fortifySource = null;
      render();
      setMessage(randomMsg('fortify'));
      return;
    }
    /* Must be adjacent and owned */
    var adj = ADJACENCY[fortifySource] || [];
    if (adj.indexOf(id) === -1) {
      setMessage("Not adjacent. Pick a neighboring territory.");
      return;
    }
    if (ts.owner !== state.currentPlayer) {
      setMessage("That's enemy territory! Pick a friendly neighbor.");
      return;
    }

    /* Move half (rounded down) or at least 1 */
    var src = state.territories[fortifySource];
    var toMove = Math.floor(src.traps / 2);
    if (toMove < 1) toMove = 1;
    src.traps -= toMove;
    ts.traps += toMove;

    setMessage("Moved " + toMove + " trap" + (toMove > 1 ? "s" : "") + " to " + getTerritoryData(id).name + ".");
    fortifySource = null;
    nextTurn();
  }
}

/* ===== PHASE TRANSITIONS ===== */
function endAttacks() {
  if (state.phase !== 'attack') return;
  attackSource = null;
  state.phase = 'fortify';
  fortifySource = null;
  document.getElementById('diceArea').innerHTML = '';
  render();
  setMessage(randomMsg('fortify'));
}

function endFortify() {
  if (state.phase !== 'fortify') return;
  fortifySource = null;
  nextTurn();
}

function endTurn() {
  if (state.phase === 'deploy') return;
  attackSource = null;
  fortifySource = null;
  document.getElementById('diceArea').innerHTML = '';
  nextTurn();
}

function getNextActivePlayer(current) {
  /* Find the next non-eliminated, non-neutral player */
  var start = current;
  var next = current;
  for (var attempt = 0; attempt < playerCount; attempt++) {
    next = next % playerCount + 1; /* cycle 1 -> 2 -> 3 -> 4 -> 1 */
    /* Skip eliminated players */
    if (state.eliminatedPlayers.indexOf(next) === -1) {
      return next;
    }
  }
  return start; /* fallback -- shouldn't happen */
}

function nextTurn() {
  var next = getNextActivePlayer(state.currentPlayer);
  if (next <= state.currentPlayer && state.eliminatedPlayers.length < playerCount - 1) {
    /* We've wrapped around, increment turn number */
    /* But only if next is less/equal AND we haven't just started */
    state.turnNumber++;
  }
  state.currentPlayer = next;
  state.phase = 'deploy';
  state.trapsToPlace = calcReinforcements(next);
  state.conqueredThisTurn = false;
  selectedTerritory = null;
  attackSource = null;
  fortifySource = null;
  document.getElementById('diceArea').innerHTML = '';
  render();
  setMessage(randomMsg('deploy'));

  /* AI turn */
  if (mode === 1 && next !== 1) {
    scheduleAi();
  }
}

/* ===== PLAYER ELIMINATION ===== */
function checkPlayerEliminated(player) {
  if (player === 0) return; /* Neutral can't be "eliminated" in the normal sense */
  var count = 0;
  for (var tid in state.territories) {
    if (state.territories[tid].owner === player) count++;
  }
  if (count === 0 && state.eliminatedPlayers.indexOf(player) === -1) {
    state.eliminatedPlayers.push(player);
    var pc = PLAYER_COLORS[player];
    setMessage(pc.name + " has been eliminated from the bay!");
  }
}

/* ===== VICTORY ===== */
function checkVictory() {
  /* Count territories per player (excluding neutral = 0) */
  var counts = {};
  var neutralCount = 0;
  for (var p = 1; p <= playerCount; p++) counts[p] = 0;
  for (var tid in state.territories) {
    var owner = state.territories[tid].owner;
    if (owner === 0) {
      neutralCount++;
    } else {
      counts[owner] = (counts[owner] || 0) + 1;
    }
  }

  /* Find players still alive */
  var alivePlayers = [];
  for (var pp = 1; pp <= playerCount; pp++) {
    if (counts[pp] > 0) alivePlayers.push(pp);
  }

  /* Victory: only one player remains with territories (neutral territories can still exist,
     but if only one player holds non-neutral territories, they win) */
  if (alivePlayers.length === 1) {
    showVictory(alivePlayers[0]);
    return true;
  }

  /* Also victory if someone owns ALL territories including neutral */
  for (var ap = 0; ap < alivePlayers.length; ap++) {
    if (counts[alivePlayers[ap]] + 0 === TERRITORIES.length) { /* owns everything */
      showVictory(alivePlayers[ap]);
      return true;
    }
  }

  return false;
}

function showVictory(player) {
  state.gameOver = true;
  var pc = PLAYER_COLORS[player];
  var title = pc.name + " Wins!";
  var text;
  if (mode === 1 && player === 1) {
    text = "You control the bay! Every lobster answers to you now. The Peconic is yours, Captain!";
  } else if (mode === 1 && player !== 1) {
    text = "The AI lobster captain (" + pc.name + ") has conquered the bay. Better luck next season!";
  } else {
    text = pc.name + " controls the bay! All fishing rights belong to the " + pc.name.split(' ')[1].toLowerCase() + " fleet!";
  }

  document.getElementById('olTitle').textContent = title + " \uD83E\uDD9E";
  document.getElementById('olText').textContent = text;
  document.getElementById('overlay').classList.add('show');
  render();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  resetGame();
}

/* ===== AI ===== */
function scheduleAi() {
  if (state.gameOver) return;
  aiTimer = setTimeout(aiTurn, 600);
}

function aiTurn() {
  if (state.gameOver) return;
  var cp = state.currentPlayer;
  if (mode === 1 && cp === 1) return; /* Player 1 is human */
  if (mode === 2) return; /* All human mode, no AI */

  if (state.phase === 'deploy') {
    aiDeploy(cp);
  } else if (state.phase === 'attack') {
    aiAttack(cp);
  } else if (state.phase === 'fortify') {
    aiFortify(cp);
  }
}

function aiDeploy(player) {
  if (state.trapsToPlace <= 0) {
    state.phase = 'attack';
    render();
    scheduleAi();
    return;
  }

  /* Find border territories (adjacent to enemy) and prioritize them */
  var owned = getOwnedTerritories(player);
  var borderTs = owned.filter(function(tid) {
    var adj = ADJACENCY[tid] || [];
    return adj.some(function(a) { return state.territories[a].owner !== player; });
  });

  var target = borderTs.length > 0 ? borderTs : owned;

  /* Deploy to weakest border territory */
  target.sort(function(a, b) { return state.territories[a].traps - state.territories[b].traps; });
  var pick = target[0];
  state.territories[pick].traps++;
  state.trapsToPlace--;

  var trapsEl = document.getElementById('traps-' + pick);
  if (trapsEl) {
    trapsEl.classList.remove('bounce');
    void trapsEl.offsetWidth;
    trapsEl.classList.add('bounce');
  }

  render();

  if (state.trapsToPlace > 0) {
    scheduleAi();
  } else {
    state.phase = 'attack';
    render();
    var pc = PLAYER_COLORS[player];
    setMessage(pc.name + " is hauling...");
    scheduleAi();
  }
}

function aiAttack(player) {
  /* Find best attack opportunity */
  var owned = getOwnedTerritories(player);
  var bestAtk = null;
  var bestScore = -999;

  for (var i = 0; i < owned.length; i++) {
    var tid = owned[i];
    var ts = state.territories[tid];
    if (ts.traps < 2) continue;

    var adj = ADJACENCY[tid] || [];
    for (var j = 0; j < adj.length; j++) {
      var neighbor = adj[j];
      var ns = state.territories[neighbor];
      if (ns.owner === player) continue;

      /* Score: our traps minus their traps, with bonus for group completion */
      var diff = ts.traps - ns.traps;
      if (diff < 1) continue; /* Don't attack unless we have advantage */

      var score = diff;
      /* Bonus for completing a group */
      var nData = getTerritoryData(neighbor);
      if (nData) {
        var groupTerrs = TERRITORIES.filter(function(t) { return t.group === nData.group; });
        var ownedInGroup = groupTerrs.filter(function(t) { return state.territories[t.id].owner === player; }).length;
        if (ownedInGroup === groupTerrs.length - 1) score += 5; /* Would complete group */
      }

      /* Slight bonus for attacking neutral (easier target) */
      if (ns.owner === 0) score += 1;

      if (score > bestScore) {
        bestScore = score;
        bestAtk = { from: tid, to: neighbor };
      }
    }
  }

  if (bestAtk) {
    attackSource = bestAtk.from;
    render();
    aiTimer = setTimeout(function() {
      resolveCombat(bestAtk.from, bestAtk.to);
      attackSource = null;
      if (!state.gameOver) {
        scheduleAi();
      }
    }, 500);
  } else {
    /* No good attacks, move to fortify */
    state.phase = 'fortify';
    document.getElementById('diceArea').innerHTML = '';
    render();
    var pc = PLAYER_COLORS[player];
    setMessage(pc.name + " is fortifying...");
    scheduleAi();
  }
}

function aiFortify(player) {
  /* Find a territory with excess traps adjacent to a weaker border territory */
  var owned = getOwnedTerritories(player);
  var bestMove = null;
  var bestScore = -1;

  for (var i = 0; i < owned.length; i++) {
    var tid = owned[i];
    var ts = state.territories[tid];
    if (ts.traps < 3) continue;

    /* Is this NOT a border territory? (interior) */
    var adj = ADJACENCY[tid] || [];
    var isBorder = adj.some(function(a) { return state.territories[a].owner !== player; });

    if (!isBorder) {
      /* Interior territory, move to adjacent border */
      for (var j = 0; j < adj.length; j++) {
        if (state.territories[adj[j]].owner === player) {
          var adjBorder = (ADJACENCY[adj[j]] || []).some(function(a) { return state.territories[a].owner !== player; });
          if (adjBorder) {
            var score = ts.traps;
            if (score > bestScore) {
              bestScore = score;
              bestMove = { from: tid, to: adj[j] };
            }
          }
        }
      }
    }
  }

  if (bestMove) {
    var src = state.territories[bestMove.from];
    var dst = state.territories[bestMove.to];
    var toMove = Math.floor(src.traps / 2);
    if (toMove < 1) toMove = 1;
    src.traps -= toMove;
    dst.traps += toMove;
    render();
  }

  aiTimer = setTimeout(function() {
    nextTurn();
  }, 400);
}

function getOwnedTerritories(player) {
  var result = [];
  for (var tid in state.territories) {
    if (state.territories[tid].owner === player) result.push(tid);
  }
  return result;
}

/* ===== UTILITIES ===== */
function getTerritoryData(id) {
  for (var i = 0; i < TERRITORIES.length; i++) {
    if (TERRITORIES[i].id === id) return TERRITORIES[i];
  }
  return null;
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = arr[i];
    arr[i] = arr[j];
    arr[j] = temp;
  }
  return arr;
}

function randomMsg(category) {
  var msgs = LOBSTER_MESSAGES[category];
  if (!msgs || msgs.length === 0) return '';
  return msgs[Math.floor(Math.random() * msgs.length)];
}

function setMessage(msg) {
  document.getElementById('messageArea').textContent = msg;
}

function setMode(m) {
  mode = m;
  document.getElementById('btn1P').className = m === 1 ? 'active' : '';
  document.getElementById('btn2P').className = m === 2 ? 'active' : '';
  resetGame();
}

function setPlayerCount(n) {
  playerCount = n;
  document.getElementById('btnPC2').className = n === 2 ? 'active' : '';
  document.getElementById('btnPC3').className = n === 3 ? 'active' : '';
  document.getElementById('btnPC4').className = n === 4 ? 'active' : '';
  resetGame();
}

/* ===== INIT ===== */
resetGame();
</script>
